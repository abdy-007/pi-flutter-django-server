version: '3.8'

services:
  frontend:
    image: pi-flutter-web:latest
    container_name: flutter_nginx
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - backend

  backend:
    image: pi-django-api:latest
    container_name: django_gunicorn
    ports:
      - "8000:8000" 
    environment:
      - "DEBUG=False"
      - "ALLOWED_HOSTS=*"
    volumes:
      - sqlite_data:/app/data  # Mounts the persistent volume into the data directory
    restart: unless-stopped

volumes:
  sqlite_data:  # Defines the named volume managed by Docker
